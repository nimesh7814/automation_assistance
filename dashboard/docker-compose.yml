services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui-streamlit:
    build:
      context: .
      dockerfile: ui-streamlit/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
