services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    env_file:
      - path: ./ui/.env
        required: false
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
