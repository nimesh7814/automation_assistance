services:
  # Single-container build (api + ui via start.sh) for hosts that only run one
  # container per service (e.g. the live demo). Not part of the default local
  # stack - run it on its own with `docker compose --profile single up app -d`,
  # not alongside api/ui/logs below (they'd collide on the same ports).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: geojson-viewer:latest
    profiles: ["single"]
    env_file:
      - path: ./ui/.env
        required: false
    environment:
      - API_BASE_URL=http://127.0.0.1:8000
      - SESSION_TTL_MINUTES=30
      - LOG_DIR=/app/logs
    volumes:
      - ./logs/app:/app/logs
    ports:
      - "8000:8000"
      - "8501:8501"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - SESSION_TTL_MINUTES=30
    volumes:
      - ./logs/api:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    env_file:
      - path: ./ui/.env
        required: false
    volumes:
      - ./logs/ui:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  logs:
    image: amir20/dozzle:latest
    environment:
      - DOZZLE_FILTER=label=com.docker.compose.project=automation_assistance
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    restart: unless-stopped
