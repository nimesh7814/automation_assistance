services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - SESSION_TTL_MINUTES=30
    volumes:
      - ./logs/api:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    env_file:
      - path: ./ui/.env
        required: false
    volumes:
      - ./logs/ui:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  logs:
    image: amir20/dozzle:latest
    environment:
      - DOZZLE_FILTER=label=com.docker.compose.project=automation_assistance
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    restart: unless-stopped
